# Discovery rules: triggered during the full walk by directory/file basename.
# A dir_names hit claims the whole subtree (sized, never matched inside).
# require_sibling_any anchors triggers to real projects; min_age_days protects
# anything you touched recently.

[[rules]]
id = "node-modules"
category = "project-artifact"
safety = "review"
impact = "next `npm/pnpm/bun install` recreates it (minutes per project)"
dir_names = ["node_modules"]
require_sibling_any = ["package.json"]
exclude_ancestors = ["Library", ".vscode", ".vscode-insiders", ".cursor", ".cursor-nightly", ".windsurf", "extensions"]
min_age_days = 14
min_size = "1MB"

[[rules]]
id = "rust-target"
category = "project-artifact"
safety = "review"
impact = "next `cargo build` recreates it (full rebuild)"
dir_names = ["target"]
require_sibling_any = ["Cargo.toml"]
exclude_ancestors = ["Library", "node_modules"]
min_age_days = 14
min_size = "10MB"

[[rules]]
id = "python-venv"
category = "project-artifact"
safety = "review"
impact = "recreate with `uv sync` / `pip install` (re-download)"
dir_names = [".venv", "venv"]
require_sibling_any = ["pyproject.toml", "requirements*.txt", "setup.py", "Pipfile", "uv.lock", "poetry.lock"]
exclude_ancestors = ["Library"]
min_age_days = 14

[[rules]]
id = "python-bytecode"
category = "project-junk"
safety = "safe"
impact = "regenerated automatically when Python runs"
dir_names = ["__pycache__"]
exclude_ancestors = ["Library"]

[[rules]]
id = "python-tool-caches"
category = "project-junk"
safety = "safe"
impact = "regenerated on next pytest/mypy/ruff/tox run"
dir_names = [".pytest_cache", ".mypy_cache", ".ruff_cache", ".tox", ".nox", ".hypothesis"]
exclude_ancestors = ["Library"]

[[rules]]
id = "js-build-outputs"
category = "project-artifact"
safety = "safe"
impact = "regenerated by the next build/dev run"
dir_names = [".next", ".nuxt", ".output", ".turbo", ".parcel-cache", ".angular", ".svelte-kit", ".astro", ".docusaurus", ".vercel", ".serverless", ".wrangler"]
require_sibling_any = ["package.json"]
exclude_ancestors = ["Library", "node_modules"]
min_age_days = 7

[[rules]]
id = "js-dist"
category = "project-artifact"
safety = "review"
impact = "build output; regenerated by the next build (check it isn't hand-curated)"
dir_names = ["dist"]
require_sibling_any = ["package.json"]
exclude_ancestors = ["Library", "node_modules"]
min_age_days = 14
min_size = "5MB"

[[rules]]
id = "gradle-build"
category = "project-artifact"
safety = "review"
impact = "next Gradle build recreates it"
dir_names = ["build"]
require_sibling_any = ["build.gradle", "build.gradle.kts", "settings.gradle", "settings.gradle.kts"]
exclude_ancestors = ["Library", "node_modules"]
min_age_days = 14
min_size = "5MB"

[[rules]]
id = "cocoapods"
category = "project-artifact"
safety = "review"
impact = "next `pod install` recreates it"
dir_names = ["Pods"]
require_sibling_any = ["Podfile"]
exclude_ancestors = ["Library"]
min_age_days = 14

[[rules]]
id = "dart-tool"
category = "project-junk"
safety = "safe"
impact = "regenerated by `flutter pub get`"
dir_names = [".dart_tool"]
require_sibling_any = ["pubspec.yaml"]
exclude_ancestors = ["Library"]

[[rules]]
id = "swift-build"
category = "project-artifact"
safety = "review"
impact = "next `swift build` recreates it"
dir_names = [".build"]
require_sibling_any = ["Package.swift"]
exclude_ancestors = ["Library"]
min_age_days = 14

[[rules]]
id = "zig-cache"
category = "project-junk"
safety = "safe"
impact = "regenerated by the next zig build"
dir_names = [".zig-cache", "zig-cache", "zig-out"]
require_sibling_any = ["build.zig"]
exclude_ancestors = ["Library"]

[[rules]]
id = "terraform-providers"
category = "project-artifact"
safety = "review"
impact = "providers re-downloaded on next `terraform init`"
dir_names = [".terraform"]
require_sibling_any = ["*.tf"]
exclude_ancestors = ["Library"]
min_age_days = 14

[[rules]]
id = "ds-store"
category = "finder-metadata"
safety = "safe"
impact = "Finder view settings per folder; recreated when you browse"
file_names = [".DS_Store"]
