dir_names = ["__pypackages__"]
require_sibling_any = ["pyproject.toml", "requirements*.txt"]
exclude_ancestors = ["Library"]
min_age_days = 14

[[rules]]
id = "ds-store"
category = "finder-metadata"
safety = "safe"
impact = "Finder view settings per folder; recreated when you browse"
file_names = [".DS_Store"]
