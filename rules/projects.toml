# Discovery rules: triggered during the full walk by directory/file basename.
# A dir_names hit claims the whole subtree (sized, never matched inside).
# require_sibling_any anchors triggers to real projects; min_age_days protects
# anything you touched recently.

[[rules]]
id = "node-modules"
category = "project-artifact"
safety = "review"
impact = "next `npm/pnpm/bun install` recreates it (minutes per project)"
dir_names = ["node_modules"]
require_sibling_any = ["package.json"]
exclude_ancestors = ["Library", ".vscode", ".vscode-insiders", ".cursor", ".cursor-nightly", ".windsurf", "extensions"]
min_age_days = 14
min_size = "1MB"

[[rules]]
id = "rust-target"
category = "project-artifact"
safety = "review"
impact = "next `cargo build` recreates it (full rebuild)"
dir_names = ["target"]
require_sibling_any = ["Cargo.toml"]
exclude_ancestors = ["Library", "node_modules"]
min_age_days = 14
min_size = "10MB"

[[rules]]
id = "python-venv"
category = "project-artifact"
safety = "review"
impact = "recreate with `uv sync` / `pip install` (re-download)"
dir_names = [".venv", "venv"]
require_sibling_any = ["pyproject.toml", "requirements*.txt", "setup.py", "Pipfile", "uv.lock", "poetry.lock"]
exclude_ancestors = ["Library"]
min_age_days = 14

