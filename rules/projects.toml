[[rules]]
id = "unity-project-artifacts"
category = "project-artifact"
safety = "review"
description = "Unity's imported asset database, generated build state, and project-local caches."
impact = "Unity reimports the entire project and rebuilds generated data, which can take substantial time."
recommendation = "Keep Assets, Packages, and ProjectSettings. Clean generated directories only when the project is inactive."
dir_names = ["Library", "Temp", "obj", "Logs", "UserSettings"]
require_sibling_any = ["Assets", "ProjectSettings"]
exclude_ancestors = ["node_modules"]
min_age_days = 14
min_size = "10MB"

[[rules]]
id = "unreal-project-artifacts"
category = "project-artifact"
safety = "review"
description = "Unreal Engine binaries, intermediates, saved build state, and derived-data cache."
impact = "Unreal rebuilds code, shaders, and imported asset data."
recommendation = "Review Saved content for unique logs or autosaves before cleanup."
dir_names = ["Binaries", "DerivedDataCache", "Intermediate", "Saved"]
require_sibling_any = ["*.uproject"]
exclude_ancestors = ["Library", "node_modules"]
min_age_days = 14
min_size = "10MB"
manual_only = true

[[rules]]
id = "python-local-packages"
