# App-specific caches outside ~/Library/Caches. Generic cache directories are
# already covered by user-app-caches; these rules add deeper, safer targets.

[[rules]]
id = "vscode-runtime-cache"
category = "ide-cache"
safety = "safe"
impact = "VS Code rebuilds runtime, extension-download, and GPU caches"
roots = [
  "~/Library/Application Support/Code/Cache",
  "~/Library/Application Support/Code/Code Cache",
  "~/Library/Application Support/Code/GPUCache",
  "~/Library/Application Support/Code/DawnGraphiteCache",
  "~/Library/Application Support/Code/DawnWebGPUCache",
  "~/Library/Application Support/Code/CachedData",
  "~/Library/Application Support/Code/CachedExtensions",
  "~/Library/Application Support/Code/CachedExtensionVSIXs",
  "~/Library/Application Support/Code/component_crx_cache",
  "~/Library/Application Support/Code/Crashpad/completed",
  "~/Library/Application Support/Code/logs",
]
process_names = ["/Visual Studio Code.app/"]

[[rules]]
id = "vscode-insiders-runtime-cache"
category = "ide-cache"
safety = "safe"
impact = "VS Code Insiders rebuilds runtime, extension-download, and GPU caches"
