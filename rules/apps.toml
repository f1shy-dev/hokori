[[rules]]
id = "xcode-device-logs"
category = "logs"
safety = "safe"
impact = "device and simulator diagnostic logs are removed"
roots = [
  "~/Library/Developer/Xcode/iOS Device Logs",
  "~/Library/Developer/Xcode/watchOS Device Logs",
  "~/Library/Logs/CoreSimulator",
]
process_names = ["/Xcode.app/", "/Simulator.app/"]
