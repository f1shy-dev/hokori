[[rules]]
id = "cached-apple-firmware"
category = "device-firmware"
safety = "review"
impact = "iPhone, iPad, Apple TV, or Apple Watch firmware must be downloaded again"
roots = [
  "~/Library/iTunes/*Software Updates/*.ipsw",
  "~/Library/Group Containers/*group.com.apple.configurator*/Library/Caches/*.ipsw",
]
manual_only = true
min_age_days = 30

[[rules]]
id = "docker-user-cache"
category = "virtualization-cache"
safety = "review"
impact = "Docker rebuilds local build metadata, CLI downloads, logs, and temporary data"
roots = [
  "~/.docker/buildx/cache",
  "~/.docker/cli-plugins/.cache",
  "~/Library/Containers/com.docker.docker/Data/cache",
  "~/Library/Containers/com.docker.docker/Data/log",
  "~/Library/Containers/com.docker.docker/Data/tmp",
  "~/Library/Group Containers/group.com.docker/Caches",
]
process_names = ["/Docker.app/", "com.docker.backend"]
min_age_days = 14

[[rules]]
id = "podman-cache"
category = "virtualization-cache"
safety = "review"
impact = "Podman recreates cached container metadata and downloads"
roots = ["~/.local/share/containers/cache"]
process_names = ["podman machine", "/Podman Desktop.app/"]
min_age_days = 14

