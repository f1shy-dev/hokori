  "~/Library/Application Support/Code - Insiders/component_crx_cache",
  "~/Library/Application Support/Code - Insiders/Crashpad/completed",
  "~/Library/Application Support/Code - Insiders/logs",
]
process_names = ["/Visual Studio Code - Insiders.app/"]

