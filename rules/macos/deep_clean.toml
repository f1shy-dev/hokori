[[rules]]
id = "webkit_storage"
kind = "data"
action = "deep_clean"
patterns = [
  "~/Library/WebKit/*/WebsiteData/**",
  "~/Library/Containers/*/Data/Library/WebKit/WebsiteData/**",
  "~/Library/Containers/*/Data/Library/WebKit/WebsiteDataStore/*/NetworkCache/**",
  "~/Library/Containers/*/Data/Library/WebKit/WebsiteDataStore/*/MediaCache/**",
  "~/Library/Containers/*/Data/Library/WebKit/WebsiteDataStore/*/IndexedDB/**",
  "~/Library/Containers/*/Data/Library/WebKit/WebsiteDataStore/*/LocalStorage/**",
  "~/Library/Containers/*/Data/Library/Caches/WebKit/NetworkCache/**",
  "~/Library/Containers/*/Data/Library/Caches/WebKit/CacheStorage/**",
  "~/Library/Containers/*/Data/tmp/WebKit/MediaCache/**",
  "~/Library/Containers/*/Data/tmp/MediaCache/**",
  "~/Library/WebKit/Databases/**",
  "~/Library/Containers/*/Data/Library/WebKit/Databases/**",
  "~/Library/Safari/Databases/**",
  "~/Library/Safari/LocalStorage/**",
  "~/Library/Application Support/*/WebStorage/*/IndexedDB/**",
  "~/Library/Application Support/*/Session Storage/**",
  "~/Library/Application Support/*/Local Storage/**",
  "**/WebStorage/QuotaManager",
  "**/WebStorage/QuotaManager-journal",
  "**/Network Persistent State",
  "**/TransportSecurity",
  "**/Reporting and NEL",
  "**/Trust Tokens",
  "**/Trust Tokens-journal",
  "**/File System/**",
  "**/FileSystem/**",
]

[rules.context]
sample_strategy = "macos_library_app"

[[rules]]
id = "container_cookies"
kind = "data"
action = "deep_clean"
patterns = [
  "~/Library/Containers/*/Data/Library/Cookies/Cookies.binarycookies",
]

[rules.context]
sample_strategy = "macos_library_app"
